<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Argus · Operator</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="operator">
  <div class="topbar">
    <h1>ARGUS</h1>
    <div class="ao-control">
      <label for="preset-select">AO</label>
      <select id="preset-select"></select>
      <span id="ao-title"></span>
    </div>
  </div>
  <div class="layout">
    <div id="map"></div>
    <div class="sidebar">
      <div class="unit-panel">
        <h2>UNITS</h2>
        <div id="unit-list"></div>
      </div>
      <div class="transcript-panel">
        <h2>REPORTS</h2>
        <div id="transcript-log"></div>
      </div>
    </div>
  </div>
  <script type="module" src="./src/operator.ts"></script>
</body>
</html>
