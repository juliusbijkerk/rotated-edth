<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Argus · Unit</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="unit">
  <div class="topbar">
    <h1>ARGUS · <span class="unit-label-display">UNIT</span></h1>
  </div>
  <div id="picker" class="picker"></div>
  <div id="session" class="session" style="display:none">
    <div id="last" class="last">
      <div class="echo-head">last detection</div>
      <div class="echo-text">—</div>
    </div>
    <button id="ptt" class="ptt">PUSH&nbsp;TO&nbsp;TALK</button>
    <form id="manual-report" class="manual-report">
      <textarea id="manual-text" rows="3" placeholder="Type report if mic is unavailable"></textarea>
      <button id="manual-send" type="submit">SEND REPORT</button>
    </form>
    <div id="status" class="status">ready</div>
  </div>
  <script type="module" src="./src/unit.ts"></script>
</body>
</html>
